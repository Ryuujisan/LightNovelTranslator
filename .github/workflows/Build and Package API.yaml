name: Build and Package API

on:
  push:
    tags:
      - 'api*'

# Nadanie uprawnień do tworzenia i edycji wydań oraz wrzucania plików binarnych
permissions:
  contents: write

jobs:
  build-api:
    name: Build for -r ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runtime:
          - win-x64
          - linux-x64
          - osx-arm64
          - osx-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API
        run: |
          dotnet publish src/LightNovelTranslator.Api \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o build-output/${{ matrix.runtime }}

      - name: Create Zip Archive
        run: |
          mkdir -p dist
          zip -r "dist/LightNovelTranslator.Api-${{ matrix.runtime }}.zip" "build-output/${{ matrix.runtime }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-${{ matrix.runtime }}
          path: dist/*.zip
          if-no-files-found: error

  publish-release:
    name: Create or Update GitHub Release
    needs: build-api # Czeka na zakończenie wszystkich 4 kompilacji z matrycy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: api-*
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: all-artifacts/*.zip
          generate_release_notes: true # Edytuje/generuje treść notatki z commitów, jeśli jej nie ma
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}