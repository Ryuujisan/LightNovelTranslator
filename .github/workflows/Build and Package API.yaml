name: Build and Package API

on:
  push:
    tags:
      - "api*"

permissions:
  contents: write

jobs:
  build-api:
    name: Publish for -r ${{ matrix.runtime }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        runtime:
          - win-x64
          - linux-x64
          - osx-arm64
          - osx-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/LightNovelTranslator.Api/LightNovelTranslator.Api.csproj

      - name: Publish API
        run: |
          dotnet publish src/LightNovelTranslator.Api/LightNovelTranslator.Api.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            --no-restore \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o build-output/${{ matrix.runtime }}

      - name: Create Zip Archive
        run: |
          mkdir -p dist
          cd build-output/${{ matrix.runtime }}
          zip -r "../../dist/LightNovelTranslator.Api-${{ matrix.runtime }}.zip" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-${{ matrix.runtime }}
          path: dist/LightNovelTranslator.Api-${{ matrix.runtime }}.zip
          if-no-files-found: error

  publish-release:
    name: Create or Update GitHub Release
    needs: build-api
    runs-on: ubuntu-latest

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: api-*
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: all-artifacts/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}