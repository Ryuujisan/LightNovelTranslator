name: Build and Package API

on:
  push:
    tags:
      - 'api*'

jobs:
  publish-api:
    name: Publish for -r ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        runtime:
          - win-x64
          - linux-x64
          - osx-arm64
          - osx-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API
        run: |
          dotnet publish src/LightNovelTranslator.Api \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o build-output/${{ matrix.runtime }}

      - name: Create Zip Archive
        run: |
          mkdir -p dist
          zip -r "dist/LightNovelTranslator.Api-${{ matrix.runtime }}.zip" "build-output/${{ matrix.runtime }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-${{ matrix.runtime }}
          path: dist/*.zip
          if-no-files-found: error
